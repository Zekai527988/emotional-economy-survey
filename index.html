<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<title>数字情绪经济研究项目</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:"Microsoft YaHei",sans-serif;
background:#f3f4f6;
margin:0;
}

header{
background:#111;
color:white;
padding:30px;
text-align:center;
}

nav{
background:#e5e7eb;
text-align:center;
padding:15px;
}

nav button{
background:#2563eb;
color:white;
border:none;
border-radius:6px;
padding:10px 20px;
margin:5px;
cursor:pointer;
}

section{
display:none;
max-width:900px;
margin:auto;
margin-top:30px;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

#intro{
display:block;
}

label{
display:block;
margin-top:18px;
font-weight:600;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
}

button.submit{
margin-top:25px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
padding:14px 24px;
cursor:pointer;
}

canvas{
margin-top:30px;
}

footer{
text-align:center;
margin-top:40px;
padding:30px;
color:#666;
}

</style>

</head>

<body>

<header>

<h1>数字情绪经济研究项目</h1>

<p>直播刷礼物行为与情绪经济调查</p>

</header>

<nav>

<button onclick="showPage('intro')">研究介绍</button>

<button onclick="showPage('survey')">在线问卷</button>

<button onclick="showPage('stats')">数据统计</button>

</nav>

<!-- 研究介绍 -->

<section id="intro">

<h2>研究介绍</h2>

<p>

本研究探索直播平台中的

<b>情绪经济（Emotional Economy）</b>。

</p>

<p>

观众通过礼物提供经济支持，

主播通过互动提供情绪价值，

形成一种数字亲密关系。

</p>

<ul>

<li>为什么观众会刷礼物？</li>

<li>直播带来什么情绪价值？</li>

<li>这种关系是否影响现实情感？</li>

</ul>

<p>

问卷完全匿名，仅用于学术研究。

</p>

</section>

<!-- 问卷 -->

<section id="survey">

<h2>在线调查问卷</h2>

<form

id="surveyForm"

method="POST"

action="https://script.google.com/macros/s/AKfycbwFTdSFcSv2nJ9b3IfTVpXKmPAqnyM53CTpj_rPOrr_5wkwAUYtrpkC21INSy_jc4Bsbg/exec"

target="hidden_iframe"

onsubmit="submitForm()"

>

<label>年龄</label>
<input type="number" name="age">

<label>性别</label>
<select name="gender">
<option>男</option>
<option>女</option>
<option>其他</option>
<option>不愿透露</option>
</select>

<label>所在地区</label>
<input type="text" name="region">

<label>最常观看平台</label>
<select name="platform">
<option>抖音</option>
<option>B站</option>
<option>Twitch</option>
<option>快手</option>
<option>其他</option>
</select>

<label>是否刷过礼物</label>
<select name="gift">
<option>是</option>
<option>否</option>
</select>

<label>累计刷礼物金额</label>
<input type="number" name="money">

<label>刷礼物原因</label>
<select name="reason">
<option>支持主播</option>
<option>陪伴感</option>
<option>PK竞争</option>
<option>社群认同</option>
<option>情绪补偿</option>
<option>其他</option>
</select>

<button class="submit" type="submit">提交问卷</button>

</form>

<div id="success" style="display:none;color:green;margin-top:15px;">
感谢参与！问卷已提交。
</div>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</section>

<!-- 数据统计 -->

<section id="stats">

<h2>数据统计</h2>

<canvas id="platformChart"></canvas>

<canvas id="reasonChart"></canvas>

</section>

<footer>

Digital Emotional Economy Research Project

</footer>

<script>

function showPage(page){

document.getElementById("intro").style.display="none";
document.getElementById("survey").style.display="none";
document.getElementById("stats").style.display="none";

document.getElementById(page).style.display="block";

}

function submitForm(){

setTimeout(function(){

document.getElementById("success").style.display="block";
document.getElementById("surveyForm").reset();

},500);

}

/* 数据统计 */

fetch("https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1")

.then(res => res.json())

.then(data => {

let platform = {};
let reason = {};

data.forEach(row=>{

platform[row.platform] = (platform[row.platform]||0)+1;
reason[row.reason] = (reason[row.reason]||0)+1;

});

/* 平台统计 */

new Chart(document.getElementById("platformChart"),{

type:"bar",

data:{
labels:Object.keys(platform),
datasets:[{
label:"观看平台分布",
data:Object.values(platform)
}]
}

});

/* 刷礼物原因 */

new Chart(document.getElementById("reasonChart"),{

type:"bar",

data:{
labels:Object.keys(reason),
datasets:[{
label:"刷礼物原因",
data:Object.values(reason)
}]
}

});

});

</script>

</body>
</html>
